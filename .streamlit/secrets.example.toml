# Copy this file to Streamlit Cloud > App > Settings > Secrets.
# Do not commit real API keys.
# Choose: "anthropic", "openai", or "deepseek".
LLM_PROVIDER = "anthropic"

# Anthropic/OpenAI route through qweapi.com:
QWEAPI_BASE_URL = "https://qweapi.com"
QWEAPI_API_KEY = ""
ANTHROPIC_QWEAPI_MODEL = "claude-opus-4-8"
OPENAI_QWEAPI_MODEL = "gpt-5.5"

# Optional direct DeepSeek compatibility:
DEEPSEEK_API_KEY = ""
DEEPSEEK_MODEL = "deepseek-v4-pro"

# Optional future integrations:
# ANTHROPIC_API_KEY = ""
